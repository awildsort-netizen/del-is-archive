name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build downloadable app zip
        run: make zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: del-is-archive
          path: dist/del-is-archive.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/del-is-archive.zip
